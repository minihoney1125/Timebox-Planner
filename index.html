<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Boxing Daily Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Calendar -->
        <aside class="calendar-sidebar">
            <div class="calendar-header">
                <button id="prev-month" class="icon-btn"><i class="fas fa-chevron-left"></i></button>
                <h3 id="month-year-display">March 2026</h3>
                <button id="next-month" class="icon-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="calendar-weekdays">
                <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
            </div>
            <div class="calendar-days" id="calendar-days">
                <!-- Generated by JS -->
            </div>
            <div class="calendar-copy-area">
                <button id="copy-prev-day-btn" class="copy-prev-btn">
                    <i class="fas fa-copy"></i> 전일복사
                </button>
            </div>
        </aside>

        <!-- Main Planner -->
        <div class="planner-container">
            <header class="planner-header">
                <div class="logo-area">
                    <div class="hourglass-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c.3 0 .5.2.5.5v2.8c0 .8-.3 1.6-.9 2.2l-3.2 3.2c-.3.3-.3.8 0 1.1l3.2 3.2c.6.6.9 1.4.9 2.2v2.8c0 .3-.2.5-.5.5H4c-.3 0-.5-.2-.5-.5v-2.8c0-.8.3-1.6.9-2.2l3.2-3.2c.3-.3.3-.8 0-1.1L4.4 9.5c-.6-.6-.9-1.4-.9-2.2V4.5C3.5 4.2 3.7 4 4 4z"/>
                            <path d="M8 4v2c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2V4M8 20v-2c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"/>
                            <path d="M12 12v.01"/>
                        </svg>
                    </div>
                    <div class="title-text">
                        <h2 class="subtitle">TIME BOXING</h2>
                        <h1 class="title">DAILY<br>PLANNER</h1>
                    </div>
                </div>
                
                <div class="date-area">
                    <div class="date-input-group">
                        <label for="date-input">Date</label>
                        <input type="text" id="date-input" class="date-input" readonly>
                    </div>
                    <div class="days-group" id="days-group">
                        <div class="day-circle" data-day="0">S</div>
                        <div class="day-circle" data-day="1">M</div>
                        <div class="day-circle" data-day="2">T</div>
                        <div class="day-circle" data-day="3">W</div>
                        <div class="day-circle" data-day="4">T</div>
                        <div class="day-circle" data-day="5">F</div>
                        <div class="day-circle" data-day="6">S</div>
                    </div>
                </div>
            </header>

            <!-- Today Keypoint Section -->
            <section class="keypoint-section">
                <div class="keypoint-header">
                    <i class="fas fa-key"></i>
                    <h3>Today Keypoint</h3>
                    <span class="ko-sub">(오늘의 핵심 포인트)</span>
                </div>
                <div class="keypoint-list">
                    <div class="keypoint-item">
                        <input type="checkbox" class="bd-checkbox keypoint-checkbox" data-key="keypoint-check-1">
                        <textarea class="keypoint-input auto-expand" data-key="keypoint-1" placeholder="Key insight or reminder #1"></textarea>
                    </div>
                    <div class="keypoint-item">
                        <input type="checkbox" class="bd-checkbox keypoint-checkbox" data-key="keypoint-check-2">
                        <textarea class="keypoint-input auto-expand" data-key="keypoint-2" placeholder="Key insight or reminder #2"></textarea>
                    </div>
                    <div class="keypoint-item">
                        <input type="checkbox" class="bd-checkbox keypoint-checkbox" data-key="keypoint-check-3">
                        <textarea class="keypoint-input auto-expand" data-key="keypoint-3" placeholder="Key insight or reminder #3"></textarea>
                    </div>
                </div>
            </section>

            <main class="planner-content">
                <aside class="left-panel">
                    <section class="priorities-section">
                        <div class="section-header">
                            <h3>Top Priorities</h3>
                            <span class="ko-sub">(우선 순위 3가지)</span>
                        </div>
                        <div class="priorities-list">
                            <div class="priority-item box-highlight">
                                <input type="checkbox" class="bd-checkbox priority-checkbox" data-key="priority-check-1">
                                <span class="number-circle">1</span>
                                <textarea class="priority-input auto-expand" data-key="priority-1" placeholder="What's most important today?"></textarea>
                            </div>
                            <div class="priority-item box-highlight">
                                <input type="checkbox" class="bd-checkbox priority-checkbox" data-key="priority-check-2">
                                <span class="number-circle">2</span>
                                <textarea class="priority-input auto-expand" data-key="priority-2" placeholder="Second priority"></textarea>
                            </div>
                            <div class="priority-item box-highlight">
                                <input type="checkbox" class="bd-checkbox priority-checkbox" data-key="priority-check-3">
                                <span class="number-circle">3</span>
                                <textarea class="priority-input auto-expand" data-key="priority-3" placeholder="Third priority"></textarea>
                            </div>
                        </div>
                    </section>

                    <section class="brain-dump-section">
                        <div class="section-header">
                            <h3>Brain Dump</h3>
                            <span class="ko-sub">(모든 생각 쏟아내기)</span>
                        </div>
                        <div class="brain-dump-list" id="brain-dump-list">
                            <!-- JS will generate 15-20 rows of checkbox + input -->
                        </div>
                    </section>
                </aside>

                <section class="timebox-grid-section">
                    <div class="grid-header">
                        <div class="empty-corner">Time Box</div>
                        <div class="minute-headers">
                            <span>: 00</span>
                            <span>: 30</span>
                        </div>
                    </div>
                    <div class="grid-body" id="timebox-grid">
                        <!-- JavaScript will generate rows here -->
                    </div>
                </section>
            </main>
        </div>
    </div>
    
    <!-- Firebase SDKs (compat version to support local file:// access) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAab2hNwk-TlXOUOGWrVPAgCqUmxjG6nY",
            authDomain: "timebox-planner-8fe89.firebaseapp.com",
            projectId: "timebox-planner-8fe89",
            storageBucket: "timebox-planner-8fe89.firebasestorage.app",
            messagingSenderId: "1090078372752",
            appId: "1:1090078372752:web:129fa26e8c365fd998f915",
            measurementId: "G-3KZT5GGMJ1"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        window.firebaseDB = firebase.firestore();
        window.dispatchEvent(new Event('firebaseReady'));
    </script>
    <script src="app.js"></script>
</body>
</html>
